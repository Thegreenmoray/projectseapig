name: Go CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.22"
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
          python-version: '3.x'

      # 👈 CRITICAL: Install pytest so it's available in PATH
    - name: Install Python dependencies
      run: |
          python -m pip install --upgrade pip
          pip install pytest    

    - name: Build
      run: go build ./...

    - name: Run tests
      run: go test ./...

    - name: Run full coverage
      run: go test -coverpkg=./... -coverprofile=coverage.out ./...

    - name: Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: coverage.out